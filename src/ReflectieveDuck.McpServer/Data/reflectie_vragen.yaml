algemeen:
  - "Hoe voel je je op dit moment?"
  - "Waar ben je dankbaar voor vandaag?"
  - "Wat heb je vandaag geleerd over jezelf?"
  - "Hoe zou je je dag in één woord omschrijven?"
  - "Is er iets dat je dwars zit?"
  - "Hoe vol is je emmer op dit moment (0-100)?"
  - "Welke prikkels vielen vandaag zwaarder dan verwacht?"
  - "Heb je vandaag hulp gevraagd? Zo niet, had je dat wel gewild?"
  - "Was er vandaag een moment dat je je buitengesloten voelde?"
  - "Heb je genoeg schakeltijd gehad tussen activiteiten?"

groen:
  - "Wat ging er vandaag goed en waarom?"
  - "Welke sterke punten heb je vandaag ingezet?"
  - "Hoe kun je dit goede gevoel vasthouden?"
  - "Is er iets dat je nu wilt vieren?"
  - "Wat wil je morgen bereiken met deze energie?"
  - "Wie zou je vandaag kunnen helpen?"
  - "Welk project verdient nu extra aandacht?"
  - "Heb je vandaag via één communicatiekanaal gewerkt (Teams óf mail)?"
  - "Heb je je checklist of Jira-bord bijgewerkt?"
  - "Heb je bewegingspauzes genomen vandaag?"
  - "Heb je creatieve momenten gehad als uitlaatklep (schrijven, schetsen)?"
  - "Was er een koffiemoment dat als resetmoment werkte?"
  - "Heb je aan het einde van de dag iets positiefs genoteerd?"

oranje:
  - "Wat kost je op dit moment de meeste energie?"
  - "Welke taak kun je uitstellen of delegeren?"
  - "Heb je vandaag al een pauze genomen?"
  - "Wat zou je dag een klein beetje beter maken?"
  - "Welke prikkel kun je nu verminderen?"
  - "Is er iemand die je om hulp kunt vragen?"
  - "Wat is het belangrijkste om nu af te ronden?"
  - "Stoort geluid je meer dan normaal op dit moment?"
  - "Is de temperatuur op je werkplek prettig? (>22°C = extra belastend)"
  - "Zijn Teams én mail allebei actief? Kun je er één uitzetten?"
  - "Zijn er onverwachte taakwisselingen geweest vandaag?"
  - "Heb je een korte notitie gemaakt over wat spanning veroorzaakt?"
  - "Kun je je koptelefoon opzetten om prikkels te verminderen?"
  - "Heb je al een kort wandelingetje gemaakt (2-5 minuten)?"
  - "Kun je de box breathing oefening doen (4-4-4-4)?"
  - "Is het nuttig om de Definition of Ready in te roepen voor je huidige taak?"

rood:
  - "Wat heb je nu het meest nodig?"
  - "Kun je vandaag iets laten vallen?"
  - "Heb je al iets gegeten en gedronken?"
  - "Is er iemand die je nu kunt bellen?"
  - "Wat is het allerkleinste dat je nu kunt doen?"
  - "Welke verplichting kun je afzeggen?"
  - "Hoe kun je het komende uur zo rustig mogelijk maken?"
  - "Heb je Teams, telefoon en mail al uitgezet?"
  - "Kun je naar een stille plek of naar huis?"
  - "Is er iemand die taken van je kan overnemen?"
  - "Kun je de SOS-meditatie proberen?"
  - "Kun je je voorstellen in een veilige bubbel?"
  - "Kun je monotoon achteruit tellen (100, 93, 86...)?"
  - "Focus alleen op je ademhaling — niets anders."

blauw:
  - "Weet je dat het oké is om nu even niets te doen?"
  - "Heb je water binnen handbereik?"
  - "Kun je ergens comfortabel gaan liggen of zitten?"
  - "Is er iemand die moet weten dat je het moeilijk hebt?"
  - "Wat is het allerkleinste stapje richting beter voelen?"
  - "Kun je een timer zetten en even helemaal niets doen?"
  - "Kun je beginnen met één makkelijke, overzichtelijke taak?"
  - "Werk je via één kanaal per keer (eerst Teams, dan later mail)?"
  - "Heb je je dagboeknotitie gemaakt? (1-2 zinnen over triggers/herstel)"
  - "Heb je een vaste routine gevolgd vandaag (wandeling, koffiemoment)?"
  - "Kun je een creatief rustmoment inzetten (schrijven, tuinieren, LEGO)?"
  - "Neem je sensorische signalen serieus op dit moment?"
  - "Kun je een korte ademmeditatie doen (30 seconden ogen dicht)?"
