dominanteSterktes:
  beschrijving: >
    Op basis van de consistente hoge scores (4-5) op gerelateerde stellingen
    zijn de volgende karaktersterktes het meest dominant:
  sterktes:
    - naam: "Eerlijkheid/Integriteit"
      score: "Zeer hoog (consistent 5)"
      toelichting: "Eerlijkheid als kernwaarde komt in bijna elke gerelateerde stelling terug als 5."
    - naam: "Rechtvaardigheid/Fairness"
      score: "Zeer hoog (5)"
      toelichting: "Gelijke behandeling van iedereen, ongeacht achtergrond."
    - naam: "Nieuwsgierigheid/Leergierigheid"
      score: "Hoog (4-5)"
      toelichting: "Graag nieuwe dingen proberen, interesse breed."
    - naam: "Waardering van schoonheid"
      score: "Hoog (5)"
      toelichting: "Ziet schoonheid in dingen die anderen niet opmerken."
    - naam: "Moed/Dapperheid"
      score: "Hoog (4)"
      toelichting: "Staat voor overtuigingen, ook als dat lastig is."
    - naam: "Betrouwbaarheid"
      score: "Zeer hoog (5)"
      toelichting: "Anderen kunnen altijd op hem rekenen, houdt zich aan afspraken."
    - naam: "Teamwork"
      score: "Hoog (4)"
      toelichting: "Werkt het best als onderdeel van een groep."
    - naam: "Voorzichtigheid/Prudentie"
      score: "Hoog (4-5)"
      toelichting: "Neemt beslissingen pas na alle feiten te kennen."
    - naam: "Dankbaarheid"
      score: "Hoog (4)"
      toelichting: "Dagelijkse waardering voor het goede in het leven."
    - naam: "Vergevingsgezindheid"
      score: "Hoog (4)"
      toelichting: "Altijd bereid om de kans te geven het goede te maken."
