titel: "ASS-wijzer psycho-educatie TT"
beschrijving: "Ingevulde ASS-wijzer op basis van psycho-educatie"

methodiek: >
  De ASSwijzer is een methode gericht op de ondersteuning van mensen met een
  autismespectrumstoornis (ASS). De ASSwijzer denkt niet in standaardoplossingen maar biedt
  een kader om op zoek te gaan naar unieke oplossingen. Hiertoe wordt een bepaalde
  systematiek gevolgd. Het geeft handvatten om een ondersteuningsstijl te zoeken die
  passend is bij die ene persoon. Mensen met ASS ondervinden ordeningsproblemen
  waardoor zij chaos ervaren en zij zich niet of onvoldoende kunnen ontplooien en ontwikkelen.

  De ASSwijzer is aangepast op basis van gesprekken en ervaringen binnen Emerhese in de
  behandeling van personen met een Autismespectrumstoornis.

  De kern van de Autismespectrumstoornis is duidelijk aanwezig maar is voor anderen niet
  altijd zichtbaar: hij/zij heeft een grote waarneming van prikkels maar deze komen als losse
  details binnen zonder zinvol verband. Hij/zij bedrijft topsport om te zorgen dat hij/zij de
  wereld begrijpt en dat alle waarnemingen die op hem/haar afkomen betekenis krijgen. Dit
  geeft vermoeidheid, onzekerheid en vaak chaos waardoor hij/zij de wereld niet meer kan
  overzien en zijn/haar functioneren en stemming onder druk komen te staan. Sommigen zijn in
  staat om dit met veel energie en denkkracht te compenseren en te camoufleren maar kunnen hierbij
  (langdurig) over hun grenzen heengaan. Behoefte aan patronen, aan een prikkelarme
  omgeving, aan een passende bejegening en voorspelbaarheid geven houvast. Het is
  belangrijk dat zowel de persoon met een Autismespectrumstoornis als de omgeving dit
  begrijpt vanuit kennis van ASS en dat hij/zij zelf en anderen hier rekening mee houden. Hoe
  voller de spreekwoordelijke emmer is, hoe meer zijn/haar functioneren onder druk komt te
  staan: de chaos wordt groter, de prikkelgevoeligheid wordt groter, het contact maken en
  communiceren wordt lastiger en de flexibiliteit vermindert. Het is van belang om te zorgen
  dat de emmer voldoende leeg is om zo goed mogelijk te kunnen functioneren.

  In gesprekken maken we een analyse van de volgende aspecten: Waar heb je last van/waar
  loopt jouw emmer van over, wat gebeurt er als de emmer overloopt, wat doe je zelf om
  ervoor te zorgen dat de emmer niet overloopt en waar kunnen anderen je bij helpen om de
  emmer te legen.

waarLooptDeEmmerVanVol:
  prikkels:
    - "Gevoelig voor licht, lichtflitsen: groot licht van auto's, lichtflitsen. Alarm knipperend licht"
    - "Gevoelig voor geluiden: lage bas geluiden komen hard binnen, hoge pieptonen, luchtventilatie systemen (gaat vrij snel naar de achtergrond)"
    - "Gevoelig voor patronen die niet kloppen, die niet symmetrisch zijn"
    - "Gevoelig voor details, ik merk van alles op ook als het niet belangrijk is, op werk grotere geheel uit het oog verliezen, moeite om de grote lijnen te zien. Door focus op details soms ook de uitkomst van een situatie al voorspeld in een 'I told you so' situatie."
    - "Gevoelig voor drukte in compacte ruimtes (zoals feestjes), in winkels en stations af en toe, maar valt mee zeker met oortjes in"
    - "Gevoelig drukte in de trein, sardientjes in een blik gevoel"
    - "Gevoelig voor kantoortuin/werkplek met anderen: alleen bij een heel druk kantoor met veel mensen die praten is er veel kans op afleiding, thuis werken juist te stil (een beetje geroezemoes is fijn)"
    - "Gevoelig voor beweging in ooghoeken (zoals knipperende lichtjes, maar ook iemand anders die daar beweegt, herhaaldelijk beweging met handen zoals bijv. pen, voeten op en neer bewegen)"
    - "Gevoelig voor rommel/verstoringen in de ruimte: graag opgeruimd, als mijn eigen huis te rommelig is, weet ik niet waar te beginnen met opruimen. Te veel rommel zorgt voor ergernis."
    - "Meerdere dingen tegelijk doen is moeilijk, afwisseling is fijn want voorkomt hyperfocus. Te veel tegelijkertijd zorgt voor verlies van overzicht."
    - "Een te vol programma: bij veel activiteiten achter elkaar (zoals drukke weekenden, scouting uitjes) en weinig slapen in combinatie met alcohol consumptie"
    - "Belangrijk hoe kleding zit of van welk materiaal het is gemaakt: lossere kleding, geen harde stof zoals wol/acryl. Marinowol is wel fijn."
    - "Gevoelig voor aanraking: ligt aan de situatie en aan de persoon, vervelend als iemand te dichtbij staat - behoefte aan ruimte en personal space"
    - "Ook leuke dingen kosten veel energie: ligt aan de activiteit (bijv. werkuitjes), merkt vermoeidheid pas naderhand als er weer tijd is voor rust. Spelletjesavond is hierop een uitzondering."
    - "Gevoelig voor geuren: ligt aan de geur, als het heel heftig is vooral. Door chronisch last van neus zijn geuren meestal minder intens. Wierrook is niet prettig."
    - "Interne prikkels zoals piekeren, gedachtes niet kunnen stoppen: mindfulness helpt hierbij, bijv. over financiële zaken, moeite met loslaten van de piekergedachtes."
    - "Gevoelig voor warmte: als thermostaat 0,5 graad naar boven gaat merk ik dat meteen. Dit heeft ook gedoe opgeleverd op werk, warmte zorgt voor verslechterde concentratie. Beklemmend en benauwde lucht. Soms een eetbui, maar probeer ik nu aan te passen. Gaat ook om behoud van ritme en structuur. Niet gevoelig voor ziekte."
    - "Vermoeidheid wordt niet op tijd gevoeld: ik voel vermoeidheid achteraf. In dagelijkse situaties voel ik het niet snel, maar word ook niet altijd moe. Bijv. ook bij drukte op de weg na werk, vermoeider thuis."
    - "Gevoelig voor smaak/textuur van voeding: voorheen gevoelig voor verschillende soorten melk, nepvlees textuur, gehakt. Textuur is onderdeel van de smaak en eetbeleving."
    - "Gevoelig voor sferen: gevoelig voor 'verkeerde muziek', grand café in kantoorruimte, gevoelig voor stress van anderen (bij moeders familie)."
    - "Douchen/wassen is vervelend, druppels zijn onaangenaam. Tijd voelt niet nuttig."
    - "Autorijden kost de laatste tijd een stuk meer energie"

  contactCommunicatie:
    - "Tijd nodig om taal te verwerken, te begrijpen en erop te reageren: online slechte kwaliteit lastig, gezicht zien helpt om taal te verwerken. Afhankelijk hoeveel ik al van onderwerp afweet. Liever geen spraakberichten want onpersoonlijk en veel informatie in 1 keer (bellen geen probleem)."
    - "Als anderen niet duidelijk zijn in wat zij zeggen: context is belangrijk, communicatie moet direct en duidelijk, zeggen waar je op doelt (stoep vs. pad vegen), taalbarrière collega, sarcasme duurt ook langer. Ligt aan de humor, niet de grootste fan van NL humor, wel van Brits. Soms wat langer nadenken erover, context helpt."
    - "Wordt onzeker in contact/communicatie met anderen, doe ik het goed? Kan ik die persoon vertrouwen, piekeren over hoe ik overkom, hoe iemand anders gaat reageren, vooral bij eerste ontmoetingen, bijv. een date."
    - "Groepen zijn vermoeiender dan 1-op-1: ja, maar ligt aan de situatie. Hoe meer mensen, hoe vermoeiender, meer prikkels."
    - "Telefoneren geeft meer spanning dan een gewoon gesprek met iemand. Makkelijker bij bekenden, lastig als iemand onbekend is, want intentie inschatten is dan ingewikkelder. Hybride meetings op werk lastig, want dan kan ik geen gezichtsuitdrukkingen lezen, zeker als webcam uit staat."
    - "Te veel tekst is moeilijk te verwerken, in WhatsApp berichtjes, boeken, etc. (korte alinea's zijn dan fijner)"
    - "Samenwerken met de verkeerde mensen: zoek in contact daarom wel de juiste mensen op waarvan je weet dat ze samenwerken of uitleggen, i.p.v. je werk overnemen."
    - "Gesprekken over koetjes en kalfjes zijn niet boeiend/moeilijk: sommige onderwerpen wel, sommige niet. Als een onderwerp me niet boeit, maar ik ben onderdeel van gespreksgroep, probeer ik het onderwerp te veranderen. Zowel omdat het saai is maar ook om frustratie en stress te voorkomen."
    - "Moeilijk om anderen duidelijk te maken wat in hem omgaat: moeilijk om het beknopt te vertellen, en daardoor ook bezig met wat iemand anders daarvan gaat vinden. Als ik me gespannen voel dan is het moeilijk om me uit te drukken."
    - "Mensen schenken onvoldoende aandacht aan wat ik te zeggen/schrijven heb – LinkedIn recruiter profiel voorbeeld. Of onderwerp negeren."
    - "Een duidelijke rol geeft houvast in contact/communicatie: bijv. vliegende keep op kamp. Wil liever een vaste taak, anders gaat iedereen tegen me praten en dingen vragen."
    - "Hulp vragen: gevoel van zwakte, ik ben niet goed genoeg, daardoor probeer ik zo lang mogelijk geen hulp te vragen. Wat gaat de ander over me denken als ik om hulp vraag?"
    - "Letten op gezichtsuitdrukking/non-verbale taal is juist nodig, in langer durende gesprekken met meerdere personen is het wel erg vermoeiend, want op heel veel letten."
    - "Sociale media leiden tot onduidelijkheid en/of overprikkeling: WhatsApp berichten die kortaf zijn, spraakmemo's zonder context kunnen lastig zijn, intentie komt niet altijd goed over. Scrollen kan ontspannend werken."
    - "Communicatie met officiële instanties/formulieren: brieven van officiële instanties, wat voor informatie ga ik nu weer terugvinden."
    - "Als ik met iemand in gesprek ben, en er komt een extra persoon bij. 'Ho is even, wij waren in gesprek'. Schakelen van 1-op-1 gesprek naar groepsgesprek is lastig. Of dat de persoon met wie ik sprak vooral in gesprek gaat met de nieuwe persoon, dan voel ik me buitengesloten en niet belangrijk."
    - "De communicatie op werk"

  veranderingenOverzicht:
    - "Als plannen aangepast (moeten) worden: veranderingen zijn naar, zowel klein als groot."
    - "Als dingen in huis veranderen, iemand moet niet mijn huis opruimen, alles heeft een vaste plek."
    - "Als er geen structuur/regelmaat/ritme is, lastig om op te zetten en initieel aan te houden, maar als de logica en nut helder zijn is het heel fijn."
    - "Als een ritueel niet gevolgd kan worden: vaste herhalende meetings die ineens niet doorgaan, lastig verwerken."
    - "Tijdsdruk, een deadline geeft structuur, maar als je de deadline nadert wordt het stressvol."
    - "Onderbroken worden tijdens een bezigheid/handeling/gesprek geeft spanning"
    - "Zwart-wit denken, niet kunnen relativeren, vooral binnen discussies."
    - "Te genuanceerd denken en daardoor te veel relativeren, weloverwogen keuze. Maar lastig over te brengen aan anderen, waardoor anderen het kunnen beschouwen als star."
    - "Niet kunnen kiezen, in sommige situaties"
    - "Bepaalde fixaties of obsessies, vooral als emmer al vol is wordt dit lastiger"
    - "Gedachtes niet los kunnen laten voordat er duidelijkheid/oplossing/antwoord is"
    - "Als er geen duidelijke planning is, lege tijd is lastig."
    - "Als iets niet af is, lastig. Extra vervelend als het niet af komt 'waarom lukt het nou gewoon niet'"
    - "Als anderen zich niet aan afspraak/regels houden"
    - "Perfectionisme – wanneer is het goed (genoeg)? Vooral op het werk, code moet extra netjes zijn. Daardoor te gedetailleerd, waardoor het soms alleen maar slechter wordt."
    - "Lege tijd/als je niet weet wat je moet doen"
    - "Altijd/vaak hetzelfde willen eten"
    - "Schakelen tussen activiteiten is niet goed voor me, het is lastig om dan weer opnieuw mijn concentratie te vinden."
    - "In actie komen is moeilijk, iets simpels valt mee maar iets moeilijks (meerdere acties) is lastig. Overzicht bewaren, niet weten waar te beginnen."
    - "Vaste overtuigingen, ik mag niet om hulp vragen, heeft te maken met trots en pestverleden. Ik kan heel stellig zijn in mijn mening en deze als feit beschouwen."
    - "Onvoorspelbaarheid in de context van verandering"
    - "Onrechtvaardigheid"

  anders:
    - "Onvoldoende slapen, bij minder slapen duurt het langer om op gang te komen. Als ik tot 4 uur wakker ben kan ik beter de nacht doorhalen dan 3 uur slapen"
    - "Verkeerd dag/nacht ritme, als ik laat ga slapen verschuift het ritme makkelijker, ivm daglicht."
    - "Negatief zelfbeeld, pestverleden, 'niemand vindt me aardig'"
    - "ADHD-gerelateerde klachten: gedachtes die heen en weer springen"

reactieBijOvervolleEmmer:
  - "Kan minder prikkels verdragen"
  - "Kan niet goed meer nadenken"
  - "Piekeren"
  - "Contact aangaan wordt moeilijker (m.u.v. met neurodivergente mensen)"
  - "Functioneert minder in werk/huishouden"
  - "Zelfzorg komt onder druk te staan (o.a. hygiëne, voeding)"
  - "Geen keuzes kunnen maken"
  - "Wordt inflexibel, star en bot. Muur gaat omhoog."
  - "Wordt heel bepalend, dwingend, het moet op mijn manier"
  - "Trekt zich terug (= ook onderdeel van de oplossing, want geeft rust)"
  - "(Hyper)focus op één ding, om af te leiden. Bijv. YouTube filmpjes"
  - "Vermoeidheid"
  - "Hoofdpijn, merk ik vooral na piekeren"
  - "Wordt emotioneler, bijv. droevig, boos, soms huilen"
  - "Angstig, na veel gepieker, bijv. door brieven van belangrijke instanties"
  - "Nergens toe komen"
  - "Verbale agressie/woede"
  - "Somberheid"
  - "Stress eten"
  - "Te veel gamen, alcohol"

watHelptOmEmmerTeLegen:
  prikkels:
    - "Natuur/bos ingaan, op het water. Het liefst zou ik dan geen verstedelijking zien, naar dieren, bos."
    - "Vaste momenten voor zichzelf inplannen, vrijdagavonden zijn heilig. Ik zit thuis of ik ga naar mn ouders."
    - "Mindful activiteiten doen: zelf naar een museum gaan, zelf naar een film gaan."
    - "Mindfulness oefeningen"
    - "Op kantoor werken, tenzij..."
    - "Een bureau op kantoor in de hoek (niet bij de deur), een grotere divider op kantoor tussen de bureaus."
    - "Niet in een afgesloten ruimte zitten vanwege onderprikkeling, natuurlijk licht"
    - "Aanpassingen mbt geluid: slaapoordoppen (met natuurgeluiden op de achtergrond), koptelefoon op kantoor"
    - "Aanpassingen mbt licht: nachtbril voor in de auto, zonnebril, luiken, gordijnen, dimmers voor lampen"
    - "Aanpassingen visueel: gebruik van rustige kleuren en patronen, rustige inrichting, symmetrie"
    - "Tijd nemen om informatie te verwerken, middels mindfulness."
    - "Prettig om ingepakt in bed te liggen, in de dekens gerold."
    - "Vermijden of juist opzoeken van lichamelijk contact, afhankelijk van de situatie en emoties en persoon."
    - "Fietsen (door het bos, zonder muziek), zeilen, zwemmen, in de zomer fietsen naar werk."
    - "Rem vinden voor stress-eten. Chips, snacks niet structureel in huis hebben. Mindful eten."
    - "Voldoende slapen/rust nemen"
    - "Focus op iets wat boeit of rust geeft om andere prikkels te negeren, patronen in interieur, tv kijken, luisterboek"
    - "Divider bij bureau op kantoor om afleiding van deur te voorkomen"
    - "NS business card van werk"

  contactCommunicatie:
    - "Vragen om verduidelijking, is lastig omdat ik wil uitleggen waarom ik het niet begrijp"
    - "Soms een time out in een gesprek invoeren, zodat beide partijen even tot bezinning kunnen komen. Binnen een gesprek ook bewust reflecteren op mijn eigen aandeel."
    - "Gevoelens en frustraties niet opkroppen maar uiten"
    - "Vragen om hulp i.p.v. alles zelf oplossen"
    - "Bewust in gesprek gaan met iemand die ik vertrouw om te achterhalen wat er aan de hand is, dit kan helpend zijn bij collega's die ik wat langer ken, mensen van de scouting, ouders."
    - "Afspraken maken over aanwezigheid bij vergaderingen: ik ben alleen bij de vergaderingen die voor mij relevant zijn, camera van alle collega's het liefst aan in een Teams-vergadering. Als ik een vergadering niet heb bijgewoond, vraag ik aan de collega's of kijk in de notulen of er iets was wat voor mij relevant was."
    - "Bewuste keuze maken t.a.v. aanwezigheid drukke omgevingen met mensen, zoals bij feestjes of in het OV"
    - "Iemand meenemen, bijv. om mee te gaan naar een bijeenkomst, afspraak etc, ligt wel aan type afspraak en persoon, sommige afspraken met anderen voorbereiden"
    - "Uitleg aan anderen geven over ASS en wat nodig is, op een infographic zou hem helpen."
    - "Bij voorkeur 1-op-1 gesprek aangaan"
    - "Geen oogcontact maken, soms kan ik dit inzetten als een soort time out, ik kan dan mijn focus even verleggen."
    - "Plan bedenken om te belonen als een doel behaald is."

  veranderingenOverzicht:
    - "Duidelijk programma of planning maken, met lijstjes en overzichten"
    - "Gebruik van een digitale planning, zodat ik het overal mee naar toe kan nemen."
    - "Structuur in de week door vaste werkdagen, op kantoor werken, voor duidelijke grens werk en privé."
    - "Houvast in hobby (gedoseerd): scouting, Koreaans leren, houtsnijden, LEGO set, rustgevend effect."
    - "Gebruik agenda, voor belangrijke afspraken een alarmherinnering/reminder"
    - "Vaste afspraken"
    - "Aan afspraken houden"
    - "Niet in de ochtend weggaan uit Enschede"

  anders:
    - "Begeleiding vanuit wijkteam"
    - "ChatGPT gebruiken om dingen samen te vatten, gericht te kunnen zoeken."

watKunnenAnderenDoen:
  prikkels:
    - "Met mij erachter komen of ik overprikkeld ben, helpen signaleren, bijv. op werk."
    - "Als dit niet lukt, een plan bedenken hoe hierachter te komen, ook op werk"
    - "Meedenken en afspraken maken over activiteiten en rust zodat een balans ontstaat in inspanning en ontspanning"
    - "Meedenken: welke activiteiten geven rust/ontspanning"
    - "Duidelijkheid bieden over begin/eind, verschillende stappen van een activiteit, maar niet te overdreven. Zeg bij een uitnodiging bijv. begin- en eindtijd erbij."
    - "Meedenken in hoe te schakelen naar een andere activiteit, als mensen me om hulp vragen op werk is het fijn als ze kunnen zorgen dat ik mijn huidige taak goed kan pauzeren of afronden."
    - "In overleg iets overnemen als het teveel wordt, bijv. opruimen van huis, werk door collega's."

  contactCommunicatie:
    - "Hulp bieden bij start en afronding van een activiteit, als ik vraag om hulp vind ik het moeilijk om dat concreet te maken, het is fijn als anderen hier mee kunnen denken en hulp actief aanbieden."
    - "Belangrijk als de ander rustig blijft, en op een nette manier feedback geeft."
    - "Belangrijk dat anderen rekening houden met het feit dat ik tijd nodig heb om informatie te verwerken (bijv. door een time out in te lassen)"
    - "ASS-wijzer infographic bespreken (vanuit HR en management is het fijn als ze actief aanbieden om samen te kijken wat er ook alweer op de ASS-wijzer staat)"
    - "Actief helpen om hulp te vragen (signalen: als ik zelfde vraag of onderwerp blijf herhalen bijv. bij een standup, wijst dat op een probleem)"
    - "Actief inchecken of het lukt, vragen of er hulp nodig is, paar keer gedurende de dag (ook weer vanuit relevante personen)."

  veranderingenOverzicht:
    - "Schakeltijd geven"
    - "Samen een plan/planning maken, en hulp bieden bij het stellen van prioriteiten"
    - "Erop wijzen als hij van de planning afwijkt"
    - "Als een concrete verandering gaat plaatsvinden, mij zo snel mogelijk hierover informeren."
    - "Aanbieden om samen op te ruimen"

  anders:
    - "Veiligheid bieden als hij getriggerd wordt (bijv. als ik me onbegrepen voel)"
    - "Actief hulp bieden, pauze moment inlassen. 'Zullen we even een kopje koffie halen.'"

extraInzicht: "Bepaalde focus (zoals bij de supermarkt) helpt om prikkels weg te filteren"
