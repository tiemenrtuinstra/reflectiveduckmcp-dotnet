app = 'reflectieve-duck'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_HTTP_PORTS = '8080'
  DB_PATH = '/data/local.db'
  MCP_TRANSPORT = 'http'

[[mounts]]
  source = 'mcp_data'
  destination = '/data'
  initial_size = '1gb'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
